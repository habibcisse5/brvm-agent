name: Agent BRVM

on:
  schedule:
    - cron: '0 7 * * 1'   # Lundi 8h heure Paris (UTC+1)
  workflow_dispatch:        # Déclenchement manuel depuis GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer l'agent BRVM
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python agents/orchestrator.py

      - name: Préparer le dashboard pour GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
